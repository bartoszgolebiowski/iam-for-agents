# Operation-level groups for TODO app permissions
groups:
  # Permission levels
  - name: TODO_WRITE
    description: TODO app writers - create and modify tasks
    members:
      - alice
      - bob
    attributes:
      type: operation
      level: write
    clientRoles:
      - client: todo-app
        role: todo_writer

  - name: TODO_READ
    description: TODO app readers - view only access
    members:
      - charlie
      - diana
    attributes:
      type: operation
      level: read
    clientRoles:
      - client: todo-app
        role: todo_reader

  # Notes app permission levels
  - name: NOTES_WRITE
    description: NOTES app writers - create and modify notes
    members:
      - alice
      - diana
    attributes:
      type: operation
      level: write
    clientRoles:
      - client: notes-app
        role: notes_writer

  - name: NOTES_READ
    description: NOTES app readers - view only access
    members:
      - bob
      - charlie
    attributes:
      type: operation
      level: read
    clientRoles:
      - client: notes-app
        role: notes_reader

  # Resource groups - Projects
  - name: PROJECT_HR
    description: HR Management project
    members:
      - alice
    attributes:
      type: resource
      project: hr
      department: Human Resources
    clientRoles:
      - client: todo-app
        role: todo_project_hr
      - client: notes-app
        role: notes_project_hr

  - name: PROJECT_FIN
    description: Finance Management project
    members:
      - bob
    attributes:
      type: resource
      project: finance
      department: Finance
    clientRoles:
      - client: todo-app
        role: todo_project_fin
      - client: notes-app
        role: notes_project_fin

  - name: PROJECT_OPS
    description: Operations Management project
    members:
      - charlie
    attributes:
      type: resource
      project: operations
      department: Operations
    clientRoles:
      - client: todo-app
        role: todo_project_ops
      - client: notes-app
        role: notes_project_ops

  - name: PROJECT_SALES
    description: Sales Management project
    members:
      - diana
    attributes:
      type: resource
      project: sales
      department: Sales
    clientRoles:
      - client: todo-app
        role: todo_project_sales
      - client: notes-app
        role: notes_project_sales
